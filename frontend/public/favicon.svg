<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Shield background -->
  <path d="M32 4 L56 14 L56 34 C56 48 44 58 32 62 C20 58 8 48 8 34 L8 14 Z"
        fill="#1e3a5f"/>
  <!-- Shield highlight border -->
  <path d="M32 7 L53 16 L53 34 C53 46.5 42.5 56 32 59.5 C21.5 56 11 46.5 11 34 L11 16 Z"
        fill="none" stroke="#3b82f6" stroke-width="1.5"/>
  <!-- Magnifying glass circle -->
  <circle cx="28" cy="28" r="11" fill="none" stroke="#60a5fa" stroke-width="4"/>
  <!-- Magnifying glass inner -->
  <circle cx="28" cy="28" r="7" fill="#1e3a5f"/>
  <!-- Dollar sign in lens -->
  <text x="28" y="33" text-anchor="middle" font-family="Arial, sans-serif"
        font-weight="bold" font-size="11" fill="#f59e0b">$</text>
  <!-- Magnifying glass handle -->
  <line x1="36" y1="36" x2="45" y2="45" stroke="#60a5fa" stroke-width="4.5"
        stroke-linecap="round"/>
  <!-- Alert dot (red) -->
  <circle cx="46" cy="18" r="6" fill="#ef4444"/>
  <text x="46" y="22" text-anchor="middle" font-family="Arial, sans-serif"
        font-weight="bold" font-size="9" fill="white">!</text>
</svg>
